name: refresh-badges

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - '.github/scripts/**'
      - '.github/prompts/**'
      - '.github/schemas/**'
      - '.github/workflows/refresh-badges.yml'

concurrency:
  group: refresh-badges
  cancel-in-progress: false

permissions:
  contents: write
  actions: read
  id-token: write

# Opt every JS action in this workflow into Node 24 ahead of the
# 2026-06-02 forced cutover. Silences the Node 20 deprecation warning
# emitted by actions/checkout@v4, actions/create-github-app-token@v2,
# actions/upload-artifact@v4, and actions/download-artifact@v4 in every
# job. Workflow-level scope avoids drift if new jobs are added later.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. Enumerate repos across both orgs. Emits a JSON array consumed as
  #    the matrix for `classify-repo`. Each element carries everything
  #    the matrix cell needs to mint the right token and run cache_gate
  #    without an extra API call.
  # ─────────────────────────────────────────────────────────────────────
  enumerate-repos:
    runs-on: arc-df-dustfeather
    outputs:
      repos: ${{ steps.list.outputs.repos }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - id: app-token-df
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_ID }}
          private-key: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_PRIVATE_KEY }}
          owner: dustfeather

      - id: app-token-itguys
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_ID }}
          private-key: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_PRIVATE_KEY }}
          owner: ITGuys-RO

      - id: list
        env:
          GH_TOKEN_DF: ${{ steps.app-token-df.outputs.token }}
          GH_TOKEN_ITG: ${{ steps.app-token-itguys.outputs.token }}
        run: |
          set -euo pipefail

          # `gh repo list --json defaultBranchRef` returns only {"name": "main"} —
          # no nested target.oid, which is what we need as the cache key. Use the
          # GraphQL API directly so we can grab the commit SHA in one shot.
          # --paginate auto-walks pageInfo.endCursor while hasNextPage is true.
          query='
            query($login: String!, $endCursor: String) {
              repositoryOwner(login: $login) {
                repositories(first: 100, after: $endCursor) {
                  pageInfo { hasNextPage endCursor }
                  nodes {
                    nameWithOwner
                    name
                    owner { login }
                    isPrivate
                    isArchived
                    isFork
                    isEmpty
                    defaultBranchRef {
                      target { ... on Commit { oid } }
                    }
                  }
                }
              }
            }
          '

          fetch_repos() {
            local login=$1
            local token=$2
            # `--slurp` (-s) downstream needs page-streamed JSON; the inner
            # `[]` here unwraps each page's nodes array into NDJSON.
            # Post-filter `.owner.login == $login` because RepositoryOwner.repositories
            # can include collaborator repos under some account types — App
            # installation tokens are naturally scoped, but the belt-and-braces
            # filter keeps the query honest if the token is ever broadened.
            GH_TOKEN="$token" gh api graphql --paginate \
              -F login="$login" \
              -f query="$query" \
              --jq ".data.repositoryOwner.repositories.nodes[] | select(.owner.login == \"$login\")"
          }

          # Stream NDJSON from both orgs, slurp into a single array, filter,
          # and project to the matrix shape.
          {
            fetch_repos dustfeather "$GH_TOKEN_DF"
            fetch_repos ITGuys-RO   "$GH_TOKEN_ITG"
          } | jq -s '
            map(select(
              .isArchived == false
              and .isEmpty == false
              and .defaultBranchRef != null
              and .defaultBranchRef.target != null
              and .defaultBranchRef.target.oid != null
              and (.nameWithOwner | test("/.github$|/dustfeather$|-profile$") | not)
            ))
            | map({
                owner: .owner.login,
                repo: .name,
                name_with_owner: .nameWithOwner,
                head_sha: .defaultBranchRef.target.oid,
                is_public: (.isPrivate | not)
              })
          ' > /tmp/repos.json

          COUNT=$(jq 'length' /tmp/repos.json)
          echo "enumerated ${COUNT} repos"
          jq -r '.[] | "  \(.name_with_owner)  \(.head_sha[0:8])  public=\(.is_public)"' /tmp/repos.json

          # Hard floor: if enumeration returned nothing, fail loudly instead of
          # firing a matrix with zero cells (which would silently no-op).
          if [ "$COUNT" -lt 1 ]; then
            echo "::error::enumerate returned 0 repos — auth or skiplist regression"
            exit 1
          fi

          # GitHub Actions matrix needs JSON on a single line.
          REPOS=$(jq -c '.' /tmp/repos.json)
          {
            echo "repos=${REPOS}"
            echo "count=${COUNT}"
          } >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────
  # 2. Download the previous successful run's findings-bundle so matrix
  #    cells can compare head_sha and fast-path unchanged repos. Best
  #    effort — cold start (no prior) is a valid state.
  # ─────────────────────────────────────────────────────────────────────
  download-prior-findings:
    runs-on: arc-df-dustfeather
    outputs:
      has_prior: ${{ steps.stage.outputs.has_prior }}
    steps:
      - name: Find prior successful run on main
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Accept any successful main-branch run as prior context (cron,
          # push, or workflow_dispatch). The original tight filter
          # (event=schedule only) starved the cache: until the first
          # Monday cron lands, every push-triggered run cold-starts and
          # re-bills Haiku for ~16 cells. Tradeoff: a contaminated
          # findings.json from a bad push run becomes the prior. Mitigation
          # is in cache_gate.sh — it keys on $REPO_HEAD_SHA, so a bad cache
          # entry only persists until that repo's default branch moves.
          RUN_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/refresh-badges.yml/runs?status=success&branch=main&per_page=1" \
            --jq '.workflow_runs[0].id // empty' || true)
          if [ -n "$RUN_ID" ]; then
            echo "prior_run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
            echo "prior run: ${RUN_ID}"
          else
            echo "no prior successful run on main; cold start"
          fi

      - name: Download prior findings-bundle
        if: steps.find.outputs.prior_run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p prior-download
          gh run download "${{ steps.find.outputs.prior_run_id }}" \
            --name findings-bundle \
            --dir prior-download/ \
            || { echo "prior artifact expired or missing — cold start"; exit 0; }
          ls -la prior-download/ || true

      - name: Stage prior findings for matrix consumption
        id: stage
        run: |
          set -euo pipefail
          mkdir -p prior/findings
          if [ -d prior-download/findings ]; then
            cp -r prior-download/findings/* prior/findings/ 2>/dev/null || true
          fi
          if [ -f prior-download/classified.json ]; then
            cp prior-download/classified.json prior/classified.json
          fi
          echo "staged prior:"
          ls -la prior/ prior/findings/ 2>/dev/null || true
          # Signal downstream whether the prior-findings artifact is worth
          # downloading. Anything under prior/ counts (findings/*, classified.json).
          # Cold start (no prior successful scheduled run, or expired artifact)
          # leaves prior/findings/ empty and prior/classified.json absent → no
          # artifact uploaded → matrix cells should skip the download to avoid
          # the noisy `Artifact not found for name: prior-findings` warning
          # printed once per cell.
          if [ -n "$(ls -A prior/findings 2>/dev/null)" ] || [ -f prior/classified.json ]; then
            echo "has_prior=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_prior=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload prior findings for matrix
        if: steps.stage.outputs.has_prior == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prior-findings
          path: prior/
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────
  # 3. Per-repo classification. One matrix cell per repo. Cache-hit cells
  #    skip Claude entirely. fail-fast: false + continue-on-error: true
  #    so a single bad repo can't take down the whole run.
  # ─────────────────────────────────────────────────────────────────────
  classify-repo:
    needs: [enumerate-repos, download-prior-findings]
    runs-on: arc-df-dustfeather
    strategy:
      fail-fast: false
      max-parallel: 30
      matrix:
        repo: ${{ fromJson(needs.enumerate-repos.outputs.repos) }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Mint App token for ${{ matrix.repo.owner }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_ID }}
          private-key: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_PRIVATE_KEY }}
          owner: ${{ matrix.repo.owner }}

      - name: Download prior findings (best effort)
        if: needs.download-prior-findings.outputs.has_prior == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: prior-findings
          path: prior/

      - name: Cache gate (skip Claude if head_sha unchanged)
        id: cache
        env:
          REPO_OWNER: ${{ matrix.repo.owner }}
          REPO_NAME: ${{ matrix.repo.repo }}
          REPO_HEAD_SHA: ${{ matrix.repo.head_sha }}
        run: |
          set -uo pipefail
          if .github/scripts/cache_gate.sh; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify with Claude (Haiku)
        if: steps.cache.outputs.hit != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_OWNER: ${{ matrix.repo.owner }}
          REPO_NAME: ${{ matrix.repo.repo }}
          REPO_HEAD_SHA: ${{ matrix.repo.head_sha }}
          REPO_IS_PUBLIC: ${{ matrix.repo.is_public }}
        run: |
          claude \
            --print \
            --model claude-haiku-4-5 \
            --max-turns 15 \
            --permission-mode acceptEdits \
            --allowedTools Bash Read Write \
            --output-format text \
            < .github/prompts/per-repo-findings.md

      - name: Rescue findings.json from hallucinated path
        if: steps.cache.outputs.hit != 'true'
        env:
          REPO_OWNER: ${{ matrix.repo.owner }}
          REPO_NAME: ${{ matrix.repo.repo }}
        run: |
          set -euo pipefail
          # Haiku occasionally writes findings.json to a synthetic path built
          # from $REPO_NAME (e.g. /home/runner/_work/dustfeather/<repo>/findings.json)
          # instead of cwd, despite the prompt forbidding it. Prompt-only
          # hardening (commit 440fb64) wasn't enough — see run 26348528121
          # cell filelist-ext. Sweep the most common hallucination paths and
          # the wider _work tree, then mv to cwd so the guard sees it.
          if [ -f findings.json ]; then
            exit 0
          fi
          for cand in \
            "/home/runner/_work/${REPO_OWNER}/${REPO_NAME}/findings.json" \
            "/home/runner/_work/dustfeather/${REPO_NAME}/findings.json" \
            "/home/runner/_work/ITGuys-RO/${REPO_NAME}/findings.json" \
            "/tmp/findings.json" \
            "${HOME}/findings.json"; do
            if [ -f "$cand" ]; then
              echo "::warning::recovered findings.json from $cand (Haiku hallucinated path)"
              mv "$cand" findings.json
              exit 0
            fi
          done
          FOUND=$(find /home/runner/_work -maxdepth 5 -name findings.json -not -path "${PWD}/*" 2>/dev/null | head -1)
          if [ -n "$FOUND" ]; then
            echo "::warning::recovered findings.json from $FOUND (Haiku hallucinated path)"
            mv "$FOUND" findings.json
          fi

      - name: Guard — only findings.json allowed
        run: |
          set -euo pipefail
          MOD=$(git diff --name-only)
          if [ -n "$MOD" ]; then
            echo "::error::matrix cell modified tracked files (forbidden):"
            printf '  %s\n' $MOD
            exit 1
          fi
          ALLOWED='^(findings\.json|prior/.*)$'
          BAD=$(git ls-files --others --exclude-standard | grep -Ev "$ALLOWED" || true)
          if [ -n "$BAD" ]; then
            echo "::error::matrix cell created files outside allowlist:"
            printf '  %s\n' $BAD
            exit 1
          fi
          test -f findings.json || { echo "::error::findings.json missing"; exit 1; }

      - name: Validate findings.json against schema
        run: |
          python -c "
          import json, jsonschema
          data = json.load(open('findings.json'))
          schema = json.load(open('.github/schemas/findings.schema.json'))
          jsonschema.validate(data, schema)
          print('OK')
          "

      - name: Upload findings
        uses: actions/upload-artifact@v4
        with:
          # Artifact names can't contain `/`; use `__` as the owner/repo separator.
          name: findings-${{ matrix.repo.owner }}__${{ matrix.repo.repo }}
          path: findings.json
          if-no-files-found: error
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────
  # 4. Consolidator. Always runs so a partial matrix (some cells failed)
  #    still produces a classified.json from whatever succeeded — caller
  #    decides if the gaps are tolerable via missing_repos accounting in
  #    the prompt.
  # ─────────────────────────────────────────────────────────────────────
  consolidate:
    needs: [enumerate-repos, download-prior-findings, classify-repo]
    if: always() && needs.enumerate-repos.result == 'success'
    runs-on: arc-df-dustfeather
    steps:
      - uses: actions/checkout@v4

      - name: Download all findings-* artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: findings-*
          path: findings-raw/
          merge-multiple: false

      - name: Download prior findings
        if: needs.download-prior-findings.outputs.has_prior == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: prior-findings
          path: prior/

      - name: Flatten findings/ directory
        run: |
          set -euo pipefail
          mkdir -p findings
          # download-artifact lays out as findings-raw/<artifact-name>/findings.json.
          # Rename each to findings/<owner>__<repo>.json so the consolidator can
          # read them by stable filename.
          shopt -s nullglob
          for dir in findings-raw/findings-*/; do
            artifact=$(basename "$dir")          # findings-<owner>__<repo>
            key=${artifact#findings-}            # <owner>__<repo>
            if [ -f "$dir/findings.json" ]; then
              cp "$dir/findings.json" "findings/${key}.json"
            else
              echo "::warning::artifact ${artifact} has no findings.json"
            fi
          done
          echo "consolidator inputs:"
          ls -la findings/

      - name: Sanity check missing_repos
        env:
          ENUMERATED: ${{ needs.enumerate-repos.outputs.count }}
        run: |
          set -euo pipefail
          GOT=$(ls findings/ 2>/dev/null | wc -l)
          MISSING=$(( ENUMERATED - GOT ))
          echo "enumerated=${ENUMERATED} got=${GOT} missing=${MISSING}"
          if [ "$MISSING" -gt 5 ]; then
            echo "::error::missing_repos=${MISSING} > 5 — systemic failure, refusing to consolidate stale set"
            exit 1
          fi

      - name: Consolidate with Claude (Sonnet)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude \
            --print \
            --model claude-sonnet-4-6 \
            --max-turns 20 \
            --permission-mode acceptEdits \
            --allowedTools Bash Read Write \
            --output-format text \
            < .github/prompts/consolidate-classification.md

      - name: Guard — consolidator may only have written classified.json + raw-inventory.json
        run: |
          set -euo pipefail
          MOD=$(git diff --name-only)
          if [ -n "$MOD" ]; then
            echo "::error::consolidator modified tracked files (forbidden):"
            printf '  %s\n' $MOD
            exit 1
          fi
          ALLOWED='^(classified\.json|raw-inventory\.json|findings/.*|prior/.*|findings-raw/.*)$'
          BAD=$(git ls-files --others --exclude-standard | grep -Ev "$ALLOWED" || true)
          if [ -n "$BAD" ]; then
            echo "::error::consolidator created files outside allowlist:"
            printf '  %s\n' $BAD
            exit 1
          fi
          test -f classified.json    || { echo "::error::classified.json missing"; exit 1; }
          test -f raw-inventory.json || { echo "::error::raw-inventory.json missing"; exit 1; }

      - name: Validate classified.json against schema
        run: |
          python -c "
          import json, jsonschema
          data = json.load(open('classified.json'))
          schema = json.load(open('.github/schemas/classified.schema.json'))
          jsonschema.validate(data, schema)
          print('OK')
          "

      - name: Upload findings-bundle (next run's cache source)
        uses: actions/upload-artifact@v4
        with:
          name: findings-bundle
          path: |
            findings/
            classified.json
            raw-inventory.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload classified-json (renderer input)
        uses: actions/upload-artifact@v4
        with:
          name: classified-json
          path: classified.json
          if-no-files-found: error
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────
  # 5. Deterministic render + commit. No Claude here — pure Python.
  # ─────────────────────────────────────────────────────────────────────
  render-and-commit:
    needs: [consolidate]
    runs-on: arc-df-dustfeather
    steps:
      - uses: actions/checkout@v4

      - name: Download classified.json
        uses: actions/download-artifact@v4
        with:
          name: classified-json
          path: .

      - name: Render SVGs + splice README
        run: python .github/scripts/render.py classified.json

      - name: Guard — renderer only touched badges + README
        run: |
          set -euo pipefail
          ALLOWED_DIFF='^(badges-light\.svg|badges-dark\.svg|README\.md)$'
          BAD_DIFF=$(git diff --name-only | grep -Ev "$ALLOWED_DIFF" || true)
          if [ -n "$BAD_DIFF" ]; then
            echo "::error::renderer modified files outside allowlist:"
            printf '  %s\n' $BAD_DIFF
            exit 1
          fi
          ALLOWED_NEW='^(classified\.json)$'
          BAD_NEW=$(git ls-files --others --exclude-standard | grep -Ev "$ALLOWED_NEW" || true)
          if [ -n "$BAD_NEW" ]; then
            echo "::error::renderer created files outside allowlist:"
            printf '  %s\n' $BAD_NEW
            exit 1
          fi

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- badges-light.svg badges-dark.svg README.md; then
            echo "no changes; nothing to commit"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git add badges-light.svg badges-dark.svg README.md
          git commit -m "chore(badges): weekly refresh from inventory ${DATE}"
          git push
