name: refresh-badges

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - '.github/scripts/render.py'
      - '.github/prompts/refresh-badges.md'
      - '.github/schemas/classified.schema.json'

concurrency:
  group: refresh-badges
  cancel-in-progress: false

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  refresh:
    runs-on: arc-df-dustfeather
    steps:
      - uses: actions/checkout@v4

      - id: app-token-df
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_ID }}
          private-key: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_PRIVATE_KEY }}
          owner: dustfeather

      - id: app-token-itguys
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_ID }}
          private-key: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_PRIVATE_KEY }}
          owner: ITGuys-RO

      - name: Download prior classified.json (best effort)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          # Tight filter: only cron runs on main are trusted prior context.
          # Manual dispatches or push-on-renderer-change can carry experimental
          # classifications; using them as the stability anchor would propagate drift.
          RUN_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/refresh-badges.yml/runs?status=success&branch=main&event=schedule&per_page=1" \
            --jq '.workflow_runs[0].id // empty' || true)
          if [ -n "$RUN_ID" ]; then
            mkdir -p prior
            gh run download "$RUN_ID" --name classified-json --dir prior/ \
              || echo "no prior artifact (expired or absent); cold start"
          else
            echo "no prior successful scheduled run found; cold start"
          fi

      # Python + jsonschema are baked into the runner image
      # (dustfeather/shared-workflows runner-image/Dockerfile installs both;
      # JSONSCHEMA_VERSION there is pinned to match
      # .github/scripts/requirements.txt). No setup-python or per-job
      # pip install needed. If the renderer's pinned jsonschema ever
      # drifts ahead of the image's, bump JSONSCHEMA_VERSION in the
      # Dockerfile and rebuild the image.

      # Bare CLI invocation — the runner image already pre-bakes
      # /usr/local/bin/claude, so the action wrappers
      # (claude-code-action, claude-code-base-action) would only be
      # paying for orchestration we don't use. claude-code-action gates
      # events to issue/PR contexts (incompatible with cron / dispatch
      # / push), and claude-code-base-action is essentially `claude
      # --print` plus auth env-var wiring we set ourselves below.
      - name: Classify inventory with Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN_DUSTFEATHER: ${{ steps.app-token-df.outputs.token }}
          GH_TOKEN_ITGUYS: ${{ steps.app-token-itguys.outputs.token }}
        run: |
          claude \
            --print \
            --model claude-sonnet-4-6 \
            --permission-mode acceptEdits \
            --allowedTools Bash Read Write Edit Grep Glob \
            --output-format text \
            < .github/prompts/refresh-badges.md

      # Trust boundary: prompt told Claude to write only raw-inventory.json +
      # classified.json. Enforce structurally — any modified/added file outside
      # that allowlist fails the run before the renderer or commit can ship it.
      - name: Guard — Claude must only have written the two JSON files
        run: |
          set -e
          # Modified tracked files = anything Claude touched in the working tree
          MOD=$(git diff --name-only)
          if [ -n "$MOD" ]; then
            echo "::error::Claude modified tracked files (forbidden):"
            printf '  %s\n' $MOD
            exit 1
          fi
          # Untracked files Claude created, minus the allowlist
          ALLOWED='^(raw-inventory\.json|classified\.json|prior/.*)$'
          BAD=$(git ls-files --others --exclude-standard | grep -Ev "$ALLOWED" || true)
          if [ -n "$BAD" ]; then
            echo "::error::Claude created files outside allowlist:"
            printf '  %s\n' $BAD
            exit 1
          fi
          # Required outputs must actually exist
          test -f raw-inventory.json || { echo "::error::raw-inventory.json missing"; exit 1; }
          test -f classified.json    || { echo "::error::classified.json missing"; exit 1; }

      - name: Render SVGs + splice README
        run: python .github/scripts/render.py classified.json

      # Renderer must only touch badges-{light,dark}.svg + README.md. Any other
      # change here means render.py escaped its scope; fail before commit.
      - name: Guard — renderer must only have touched the three target files
        run: |
          set -e
          ALLOWED_DIFF='^(badges-light\.svg|badges-dark\.svg|README\.md)$'
          BAD_DIFF=$(git diff --name-only | grep -Ev "$ALLOWED_DIFF" || true)
          if [ -n "$BAD_DIFF" ]; then
            echo "::error::Renderer modified files outside allowlist:"
            printf '  %s\n' $BAD_DIFF
            exit 1
          fi
          # And it must not have added any new tracked file beyond the JSONs
          ALLOWED_NEW='^(raw-inventory\.json|classified\.json|prior/.*)$'
          BAD_NEW=$(git ls-files --others --exclude-standard | grep -Ev "$ALLOWED_NEW" || true)
          if [ -n "$BAD_NEW" ]; then
            echo "::error::Renderer created files outside allowlist:"
            printf '  %s\n' $BAD_NEW
            exit 1
          fi

      - name: Upload JSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classified-json
          path: |
            classified.json
            raw-inventory.json
          if-no-files-found: warn
          retention-days: 90

      - name: Commit if changed
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- badges-light.svg badges-dark.svg README.md; then
            echo "no changes; nothing to commit"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git add badges-light.svg badges-dark.svg README.md
          git commit -m "chore(badges): weekly refresh from inventory ${DATE}"
          git push
