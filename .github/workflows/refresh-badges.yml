name: refresh-badges

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - '.github/scripts/render.py'
      - '.github/prompts/refresh-badges.md'
      - '.github/schemas/classified.schema.json'

concurrency:
  group: refresh-badges
  cancel-in-progress: false

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  refresh:
    runs-on: arc-df-dustfeather
    steps:
      - uses: actions/checkout@v4

      - id: app-token-df
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_ID }}
          private-key: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_PRIVATE_KEY }}
          owner: dustfeather

      - id: app-token-itguys
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_ID }}
          private-key: ${{ secrets.ITGUYS_ARC_RUNNERS_APP_PRIVATE_KEY }}
          owner: ITGuys-RO

      - name: Download prior classified.json (best effort)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          RUN_ID=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/refresh-badges.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].id // empty' || true)
          if [ -n "$RUN_ID" ]; then
            mkdir -p prior
            gh run download "$RUN_ID" --name classified-json --dir prior/ \
              || echo "no prior artifact (expired or absent); cold start"
          else
            echo "no prior successful run found; cold start"
          fi

      - name: Install renderer dependency
        run: pip install --quiet jsonschema

      - name: Load prompt
        id: prompt
        run: |
          {
            echo 'text<<PROMPT_EOF'
            cat .github/prompts/refresh-badges.md
            echo PROMPT_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Classify inventory with Claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN_DUSTFEATHER: ${{ steps.app-token-df.outputs.token }}
          GH_TOKEN_ITGUYS: ${{ steps.app-token-itguys.outputs.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
          prompt: ${{ steps.prompt.outputs.text }}

      - name: Render SVGs + splice README
        run: python .github/scripts/render.py classified.json

      - name: Upload JSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classified-json
          path: |
            classified.json
            raw-inventory.json
          if-no-files-found: warn
          retention-days: 90

      - name: Commit if changed
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- badges-light.svg badges-dark.svg README.md; then
            echo "no changes; nothing to commit"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git add badges-light.svg badges-dark.svg README.md
          git commit -m "chore(badges): weekly refresh from inventory ${DATE}"
          git push
